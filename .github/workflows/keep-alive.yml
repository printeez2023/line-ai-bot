name: Keep Alive

on:
  schedule:
    # 6:00〜24:00 JST（21:00〜15:00 UTC）を20分ごとにping
    - cron: '0,20,40 21-23 * * *'   # 6:00〜8:40 JST
    - cron: '0,20,40 0-14 * * *'    # 9:00〜23:40 JST
  workflow_dispatch: # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Koyeb server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://misty-ninette-adavdav-70fe7799.koyeb.app/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: Server returned $STATUS"
            exit 1
          fi
